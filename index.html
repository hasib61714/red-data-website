<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Red Data — Reliable & High-Speed Internet Under One Roof. Ultra-fast broadband for homes and businesses across Bangladesh." />
    <title>Red Data | Premium Internet & IT Solutions</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Red Data" />
    <meta property="og:title" content="Red Data | Premium Internet & IT Solutions" />
    <meta property="og:description" content="Red Data — Reliable & High-Speed Internet Under One Roof. BTRC licensed ISP offering fiber internet, data connectivity, IP telephony and managed IT services across Bangladesh." />
    <meta property="og:image" content="https://red-data-website.vercel.app/logo.png" />
    <meta property="og:url" content="https://red-data-website.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Red Data | Premium Internet & IT Solutions" />
    <meta name="twitter:description" content="Red Data — Reliable & High-Speed Internet Under One Roof. BTRC licensed ISP offering fiber internet, data connectivity, IP telephony and managed IT services across Bangladesh." />
    <meta name="twitter:image" content="https://red-data-website.vercel.app/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://red-data-website.vercel.app" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Google Translate Widget — hides the toolbar, we drive it from the toggle button -->
    <style>
      .goog-te-banner-frame,
      .goog-te-balloon-frame,
      .goog-te-menu-frame { display: none !important; }
      body { top: 0 !important; }
      .skiptranslate > iframe { display: none !important; }
      /* prevent the blue translated-link underline */
      .goog-te-menu-value, .goog-te-menu-value span { color: inherit !important; }
      /* hide the floating translate element */
      #google_translate_element { position: absolute; top: -9999px; left: -9999px; height: 0; overflow: hidden; }
    </style>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', includedLanguages: 'bn', autoDisplay: false },
          'google_translate_element'
        );
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
